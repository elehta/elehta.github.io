<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

  :root { --bg: #3f4146; --surface: #484b51; --surface2: #52555c; --border: #6b6f78; --accent: #00c98a; --danger: #ff3d5a; --warn: #ffb800; --muted: #c0c4cc; --text: #f0f2f5; --text-dim: #d0d4dc; --mono: 'Space Mono', monospace; --sans: 'Plus Jakarta Sans', sans-serif; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 17px; line-height: 1.6; }
  #dpp-root { max-width: 860px; margin: 0 auto; padding-top: 60px; padding-bottom: 30px; padding-left: 16px; padding-right: 16px; }

  .dpp-header { display: grid; grid-template-columns: 1fr 25%; align-items: start; gap: 20px; padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px; animation: fadeDown 0.4s ease both; }
  .dpp-header-text { min-width: 0; }
  .dpp-eyebrow { font-family: var(--mono); font-size: 0.78rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  .dpp-title { font-size: 2.4rem; font-weight: 800; line-height: 1.1; letter-spacing: -0.01em; text-transform: uppercase; color: #fff; }
  .dpp-subtitle { font-family: var(--mono); font-size: 0.78rem; color: var(--text-dim); margin-top: 10px; word-break: break-all; }
  .dpp-logo-area { display: flex; align-items: flex-start; justify-content: flex-end; }
  .dpp-logo { width: 100%; max-width: 180px; height: auto; object-fit: contain; }
  .dpp-image { width: 120px; height: 120px; object-fit: cover; border: 1px solid var(--border); filter: grayscale(20%); }

  .meta-strip { display: flex; gap: 0; margin-bottom: 28px; border: 1px solid var(--border); overflow: hidden; animation: fadeUp 0.4s 0.1s ease both; flex-wrap: wrap; }
  .meta-cell { flex: 1; min-width: 140px; padding: 12px 16px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .meta-cell:last-child { border-right: none; }
  .meta-cell-label { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .meta-cell-value { font-size: 1.05rem; font-weight: 600; color: var(--text); }

  .section { margin-bottom: 20px; border: 1px solid var(--border); background: var(--surface); animation: fadeUp 0.4s ease both; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .section-header:hover { background: #585b62; }
  .section-number { font-family: var(--mono); font-size: 1rem; color: var(--accent); opacity: 0.7; }
  .section-title { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); flex: 1; }
  .section-toggle { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); transition: transform 0.2s; }
  .section-body { padding: 16px; }
  .section.collapsed .section-body { display: none; }
  .section.collapsed .section-toggle { transform: rotate(-90deg); }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 16px; }
  .field { background: var(--surface); padding: 12px 14px; }
  .field.full { grid-column: span 2; }
  .field-label { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .field-value { font-size: 1.05rem; font-weight: 600; color: var(--text); word-break: break-word; }
  .field-value.mono { font-family: var(--mono); font-size: 0.76rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 1rem; }
  .data-table th { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; font-weight: 400; }
  .data-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface2); }

  .badge { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.1em; font-weight: 700; padding: 3px 8px; text-transform: uppercase; display: inline-block; }
  .badge-safe       { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .badge-hazard     { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .badge-unknown    { background: transparent; color: var(--warn);   border: 1px solid var(--warn); }

  .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .score-row:last-child { margin-bottom: 0; }
  .score-label { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); width: 180px; flex-shrink: 0; letter-spacing: 0.05em; }
  .score-track { flex: 1; height: 4px; background: var(--border); position: relative; }
  .score-fill { height: 100%; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); }
  .score-fill-high { background: var(--accent); }
  .score-fill-mid  { background: var(--warn); }
  .score-fill-low  { background: var(--danger); }
  .score-value { font-family: var(--mono); font-size: 0.78rem; color: var(--text); width: 50px; text-align: right; flex-shrink: 0; }

  .claim-block { border: 1px solid var(--border); margin-bottom: 12px; }
  .claim-block:last-child { margin-bottom: 0; }
  .claim-top { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); gap: 12px; }
  .claim-topic { font-family: var(--mono); font-size: 0.68rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
  .claim-name { font-size: 1.05rem; font-weight: 700; color: var(--text); }
  .claim-desc { font-size: 0.88rem; color: var(--text-dim); line-height: 1.5; padding: 12px 14px; }
  .claim-name a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--muted); }
  .claim-name a:hover { border-color: var(--accent); color: var(--accent); }

  .claim-stub { border: 1px solid var(--border); margin-bottom: 12px; padding: 14px; background: var(--surface2); opacity: 0.6; }
  .claim-stub-lock { font-size: 1rem; margin-right: 8px; }
  .claim-stub-name { font-weight: 600; color: var(--text-dim); }
  .claim-stub-role { font-family: var(--mono); font-size: 0.68rem; color: var(--warn); margin-top: 4px; letter-spacing: 0.1em; }

  .metric-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1px; background: var(--border); }
  .metric-block { background: var(--surface); padding: 12px 14px; }
  .metric-type { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; color: var(--accent); }
  .metric-name-text { font-size: 0.88rem; font-weight: 600; margin-bottom: 4px; color: var(--text-dim); }
  .metric-val { font-family: var(--mono); font-size: 1.15rem; font-weight: 700; color: #fff; }
  .metric-unit { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); margin-left: 4px; }

  .ext-link { font-family: var(--mono); font-size: 0.74rem; color: var(--accent); text-decoration: none; letter-spacing: 0.05em; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
  .ext-link:hover { border-color: var(--accent); }

  .doc-list { list-style: none; padding: 0; }
  .doc-list li { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .doc-list li:last-child { border-bottom: none; }
  .doc-label { font-size: 0.95rem; font-weight: 600; color: var(--text); display: block; margin-bottom: 4px; }
  .doc-type { font-family: var(--mono); font-size: 0.66rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .contaminant-card { border: 1px solid var(--border); margin-bottom: 12px; padding: 14px; background: var(--surface2); }
  .contaminant-card:last-child { margin-bottom: 0; }
  .contaminant-name { font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .contaminant-detail { font-size: 0.88rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 4px; }
  .contaminant-cas { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }

  /* ── Supply chain map ────────────────────────────────────────────── */
  .supply-map-wrap { position: relative; background: var(--surface2); border: 1px solid var(--border); overflow: hidden; }
  .supply-map-svg { display: block; width: 100%; height: auto; }
  .supply-map-svg path { fill: #5a5d64; stroke: var(--border); stroke-width: 0.3; transition: fill 0.2s ease; }
  .supply-map-svg path.origin-country { fill: #7c8088; }
  .supply-map-svg path.origin-country.active { fill: var(--accent); }
  .supply-map-svg path.factory-country { fill: #6e7a72; }

  .supply-line { fill: none; stroke: var(--accent); stroke-width: 1.4; stroke-linecap: round; opacity: 0.7; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 1.2s ease-out forwards; pointer-events: none; }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }

  .origin-dot { fill: var(--accent); stroke: #fff; stroke-width: 1.2; cursor: pointer; transition: r 0.2s ease; }
  .origin-dot:hover, .origin-dot.active { r: 7; }
  .factory-dot { fill: var(--accent); stroke: #fff; stroke-width: 1.5; }
  .factory-dot-pulse { fill: var(--accent); opacity: 0.5; animation: factoryPulse 2s ease-out infinite; pointer-events: none; }
  @keyframes factoryPulse { 0% { r: 4; opacity: 0.6; } 100% { r: 16; opacity: 0; } }

  .map-label { font-family: var(--mono); font-size: 9px; fill: var(--text); paint-order: stroke; stroke: var(--surface2); stroke-width: 3; pointer-events: none; }
  .map-label-factory { font-weight: 700; fill: var(--accent); }

  .map-tooltip { position: absolute; padding: 8px 12px; background: var(--surface); border: 1px solid var(--accent); color: var(--text); font-size: 0.82rem; pointer-events: none; opacity: 0; transition: opacity 0.15s ease; max-width: 260px; z-index: 10; }
  .map-tooltip.visible { opacity: 1; }
  .map-tooltip-title { font-family: var(--mono); font-size: 0.66rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }

  .map-legend { display: flex; gap: 16px; flex-wrap: wrap; padding: 10px 14px; font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim); background: var(--surface); border-top: 1px solid var(--border); }
  .map-legend-item { display: flex; align-items: center; gap: 6px; }
  .map-legend-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 1.5px solid #fff; flex-shrink: 0; }
  .map-legend-dot.factory { box-shadow: 0 0 0 3px rgba(0,201,138,0.3); }

  .materials-interactive .contaminant-card { cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .materials-interactive .contaminant-card.active,
  .materials-interactive tr.active td { background: var(--surface); }
  /* Make data-table rows respond to highlight state */
  .data-table tr[data-cc] { cursor: pointer; }
  .data-table tr[data-cc].active td { background: rgba(0,201,138,0.12); }

  .step-list { list-style: none; padding: 0; counter-reset: step; }
  .step-list li { padding: 10px 0 10px 40px; border-bottom: 1px solid var(--border); position: relative; font-size: 0.95rem; color: var(--text-dim); line-height: 1.5; }
  .step-list li:last-child { border-bottom: none; }
  .step-list li::before { counter-increment: step; content: counter(step); position: absolute; left: 0; font-family: var(--mono); font-size: 0.85rem; font-weight: 700; color: var(--accent); width: 28px; text-align: center; }

  .variant-notice { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); padding: 10px 14px; border: 1px dashed var(--border); margin-top: 16px; letter-spacing: 0.05em; }

  /* Verified-by trust badges — surfaced right under the meta-strip */
  .verified-by { margin-bottom: 28px; padding: 14px 16px; border: 1px solid var(--border); background: var(--surface); animation: fadeUp 0.4s 0.12s ease both; }
  .verified-by-label { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .verified-by-label::before { content: '✓'; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; background: var(--accent); color: #000; font-size: 0.7rem; font-weight: 900; border-radius: 50%; }
  .verified-by-badges { display: flex; flex-wrap: wrap; gap: 8px; }
  .verified-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border: 1px solid var(--accent); color: var(--text); text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: background 0.15s, color 0.15s; }
  .verified-badge:hover { background: var(--accent); color: #000; }
  .verified-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .verified-badge:hover .verified-badge-dot { background: #000; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(10px);  } to { opacity: 1; transform: translateY(0); } }

  .section:nth-child(1) { animation-delay: 0.05s; }
  .section:nth-child(2) { animation-delay: 0.10s; }
  .section:nth-child(3) { animation-delay: 0.15s; }
  .section:nth-child(4) { animation-delay: 0.20s; }
  .section:nth-child(5) { animation-delay: 0.25s; }
  .section:nth-child(6) { animation-delay: 0.30s; }
  .section:nth-child(7) { animation-delay: 0.35s; }
  .section:nth-child(8) { animation-delay: 0.40s; }
  .section:nth-child(9) { animation-delay: 0.45s; }

  /* ── Lifecycle / "After you buy" section ────────────────────────────── */

  /* A subtle divider and label to separate LayerCoat's optional programme
     content from the standard DPP sections above. */
  .extra-divider { margin: 36px 0 16px 0; display: flex; align-items: center; gap: 14px; }
  .extra-divider::before, .extra-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .extra-divider-label { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; }

  /* Override .section styling specifically for the lifecycle block so it
     reads as a LayerCoat brand add-on rather than a standard DPP section. */
  .section.section-lifecycle { border: 1px solid #c97a2e; background: linear-gradient(180deg, #4a3e33 0%, var(--surface) 220px); box-shadow: 0 0 0 1px rgba(201, 122, 46, 0.15); }
  .section.section-lifecycle .section-header { background: linear-gradient(90deg, #5a4234 0%, #4a3a31 100%); border-bottom: 1px solid #c97a2e; }
  .section.section-lifecycle .section-header:hover { background: linear-gradient(90deg, #634936 0%, #513f34 100%); }
  .section.section-lifecycle .section-number { color: #e89454; opacity: 1; }
  .section.section-lifecycle .section-title { color: #fff; }
  .section-extra-tag { font-family: var(--mono); font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; padding: 3px 7px; background: #c97a2e; color: #1a1410; border-radius: 2px; margin-right: 8px; }

  .lifecycle-layout { display: grid; grid-template-columns: 1fr 280px; gap: 20px; align-items: start; }
  .lifecycle-image-area { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .lifecycle-image { width: 100%; aspect-ratio: 4 / 5; background: var(--surface2); border: 1px solid var(--border); object-fit: cover; }
  .lifecycle-image-placeholder { width: 100%; aspect-ratio: 4 / 5; background: var(--surface2); border: 1px dashed var(--border); display: flex; align-items: center; justify-content: center; padding: 20px; text-align: center; color: var(--muted); font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.05em; line-height: 1.5; }
  .lifecycle-image-caption { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em; text-align: center; text-transform: uppercase; }

  .buyback-callout { background: linear-gradient(135deg, #5a4234 0%, #4a3a31 100%); border: 1px solid #c97a2e; padding: 18px; margin-bottom: 20px; box-shadow: inset 0 0 30px rgba(232, 148, 84, 0.08); }
  .buyback-callout-label { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.15em; color: #e89454; text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .buyback-callout-label::before { content: '↻'; display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; background: #c97a2e; color: #1a1410; font-size: 0.85rem; font-weight: 900; border-radius: 50%; }
  .buyback-value-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 6px; }
  .buyback-value { font-family: var(--mono); font-size: 2.4rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
  .buyback-of { font-family: var(--mono); font-size: 0.78rem; color: var(--muted); }
  .buyback-provenance { font-family: var(--mono); font-size: 0.68rem; color: var(--text-dim); margin-top: 10px; line-height: 1.5; }
  .buyback-provenance strong { color: #e89454; font-weight: 700; }

  .timeline { position: relative; padding-left: 28px; margin-top: 6px; }
  .timeline::before { content: ''; position: absolute; left: 8px; top: 12px; bottom: 12px; width: 2px; background: var(--border); }
  .timeline-item { position: relative; padding-bottom: 18px; }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-item::before { content: ''; position: absolute; left: -24px; top: 6px; width: 10px; height: 10px; border-radius: 50%; background: var(--surface); border: 2px solid var(--border); }
  .timeline-item.current::before { background: #c97a2e; border-color: #c97a2e; box-shadow: 0 0 0 4px rgba(201, 122, 46, 0.25); }
  .timeline-item.future::before { background: var(--surface); }
  .timeline-when { font-family: var(--mono); font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
  .timeline-item.current .timeline-when { color: #e89454; }
  .timeline-what { font-size: 0.95rem; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .timeline-detail { font-size: 0.82rem; color: var(--text-dim); line-height: 1.5; }

  @media (max-width: 600px) {
    .dpp-header { grid-template-columns: 1fr; gap: 16px; }
    .dpp-logo-area { justify-content: flex-start; }
    .dpp-logo { max-width: 120px; }
    .dpp-title { font-size: 1.6rem; }
    .meta-strip { flex-direction: column; }
    .meta-cell { border-right: none; }
    .field-grid { grid-template-columns: 1fr; }
    .field.full { grid-column: span 1; }
    .score-label { width: 120px; }
    .metric-grid { grid-template-columns: 1fr; }
    .lifecycle-layout { grid-template-columns: 1fr; }
    .lifecycle-image-area { max-width: 280px; margin: 0 auto; }
    .buyback-value { font-size: 1.8rem; }
  }
</style>

<div id="dpp-root"></div>

<script>
  // ── World map ───────────────────────────────────────────────────────────────
  // The map SVG is fetched from GitHub Pages at render time. CSP allows this
  // via connect-src https:. The SVG uses ISO 3166-1 alpha-2 country codes
  // (lowercase) as path IDs, matching UNTP's countryCode fields.
  var WORLD_MAP_URL = 'https://elehta.github.io/worldmap.svg';

  // ── Helpers ────────────────────────────────────────────────────────────────

  function esc(v) {
    if (v === null || v === undefined) return '';
    return String(v)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function pct(v) { return Math.round((v || 0) * 100); }

  function scoreClass(v) {
    if (v >= 0.67) return 'score-fill-high';
    if (v >= 0.33) return 'score-fill-mid';
    return 'score-fill-low';
  }

  /** Resolve country — handles both string codes and UNTP Country objects */
  function countryDisplay(c) {
    if (!c) return '';
    if (typeof c === 'string') return c;
    if (c.countryName && c.countryCode) return c.countryName + ' (' + c.countryCode + ')';
    return c.countryName || c.countryCode || '';
  }

  /** Find a party by role in relatedParty array */
  function findParty(cs, role) {
    if (!cs.relatedParty) return null;
    const rp = cs.relatedParty.find(p => p.role === role);
    return rp ? rp.party : null;
  }

  /** Format a Measure object { value, unit } */
  function measureDisplay(m) {
    if (!m) return '';
    return esc(m.value) + ' ' + esc(m.unit || '');
  }

  function scoreRow(label, value) {
    return '<div class="score-row">' +
      '<span class="score-label">' + label + '</span>' +
      '<div class="score-track"><div class="score-fill ' + scoreClass(value) + '" style="width:' + pct(value) + '%"></div></div>' +
      '<span class="score-value">' + pct(value) + '%</span></div>';
  }

  function field(label, value, opts) {
    opts = opts || {};
    var cls = 'field' + (opts.full ? ' full' : '');
    var valCls = 'field-value' + (opts.mono ? ' mono' : '');
    return '<div class="' + cls + '"><div class="field-label">' + label + '</div><div class="' + valCls + '">' + value + '</div></div>';
  }

  function section(number, title, body, delay, opts) {
    opts = opts || {};
    var sectionCls = 'section' + (opts.modifier ? ' ' + opts.modifier : '');
    var extraTag = opts.extraTag
      ? '<span class="section-extra-tag">' + esc(opts.extraTag) + '</span>'
      : '';
    return '<div class="' + sectionCls + '" style="animation-delay:' + delay + 's">' +
      '<div class="section-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">' +
      '<span class="section-number">' + String(number).padStart(2, '0') + '</span>' +
      '<span class="section-title">' + title + '</span>' +
      extraTag +
      '<span class="section-toggle">▼</span></div>' +
      '<div class="section-body">' + body + '</div></div>';
  }

  function hazardBadge(m) {
    if (!('hazardous' in m)) return '<span class="badge badge-unknown">Unknown</span>';
    return m.hazardous
      ? '<span class="badge badge-hazard">Hazardous</span>'
      : '<span class="badge badge-safe">Safe</span>';
  }

  function extLink(url, label) {
    return '<a href="' + esc(url) + '" target="_blank" class="ext-link">' + esc(label) + ' ↗</a>';
  }

  // ── Section renderers (UNTP v0.7.0 schema) ────────────────────────────────

  function renderIdentity(vc, cs) {
    var manufacturer = findParty(cs, 'manufacturer');
    var brandOwner = findParty(cs, 'brandOwner');
    var facility = cs.producedAtFacility;
    var category = (cs.productCategory && cs.productCategory[0]) || null;

    var html = '<div class="field-grid">';
    html += field('Product name', esc(cs.name), { full: true });
    if (manufacturer) html += field('Manufacturer', esc(manufacturer.name));
    if (brandOwner && brandOwner.name !== (manufacturer && manufacturer.name))
      html += field('Brand owner', esc(brandOwner.name));
    html += field('Country of production', esc(countryDisplay(cs.countryOfProduction)));
    if (facility) html += field('Production facility', esc(facility.name));
    if (cs.modelNumber) html += field('Model number', esc(cs.modelNumber));
    if (cs.idGranularity) html += field('Granularity', esc(cs.idGranularity));
    if (cs.batchNumber) html += field('Batch number', esc(cs.batchNumber));
    if (cs.serialNumber) html += field('Serial number', esc(cs.serialNumber));
    if (cs.itemNumber) html += field('Item number', esc(cs.itemNumber));
    if (category) html += field('Product category', esc(category.name) + '<br><span style="font-family:var(--mono);font-size:0.72rem;color:var(--muted)">' + esc(category.schemeName) + ' ' + esc(category.code) + '</span>', { full: true });
    html += field('Credential ID', esc(cs.id), { full: true, mono: true });
    html += '</div>';

    if (cs.description) {
      html += '<div style="font-size:0.95rem;color:var(--text-dim);line-height:1.6;padding:8px 2px;">' + esc(cs.description) + '</div>';
    }

    return html;
  }

  function renderIssuer(vc) {
    var iss = vc.issuer;
    if (!iss) return '<p style="color:var(--muted);font-size:0.9rem;">No issuer data.</p>';

    var html = '<div class="field-grid">';
    html += field('Issuer name', esc(iss.name), { full: true });
    html += field('Issuer DID', esc(iss.id), { full: true, mono: true });
    html += field('Valid from', esc(vc.validFrom));
    html += field('Valid until', esc(vc.validUntil));
    html += '</div>';

    if (iss.issuerAlsoKnownAs && iss.issuerAlsoKnownAs.length) {
      html += '<div style="margin-top:12px;"><div class="field-label" style="margin-bottom:8px;">Also known as</div>';
      iss.issuerAlsoKnownAs.forEach(function(aka) {
        html += '<div style="margin-bottom:6px;">' + esc(aka.name);
        if (aka.registeredId) html += ' <span style="font-family:var(--mono);font-size:0.75rem;color:var(--muted)">(' + esc(aka.registeredId) + ')</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    return html;
  }

  function renderMaterials(cs) {
    var mats = cs.materialProvenance || cs.materialsProvenance;
    if (!mats || !mats.length) return '<p style="color:var(--muted);font-size:0.9rem;">No material data.</p>';

    // Summary bar
    var totalRecycled = 0;
    mats.forEach(function(m) { totalRecycled += (m.massFraction || 0) * (m.recycledMassFraction || 0); });
    var html = '<div style="margin-bottom:16px;">' + scoreRow('Overall recycled content', totalRecycled) + '</div>';

    var rows = mats.map(function(m, idx) {
      var cc = '';
      if (m.originCountry && typeof m.originCountry === 'object' && m.originCountry.countryCode) {
        cc = String(m.originCountry.countryCode).toLowerCase();
      } else if (typeof m.originCountry === 'string') {
        cc = m.originCountry.toLowerCase();
      }
      return '<tr data-cc="' + esc(cc) + '" data-material-idx="' + idx + '">' +
        '<td>' + esc(m.name) + '</td>' +
        '<td style="font-family:var(--mono);font-size:0.8rem;">' + pct(m.massFraction) + '%' +
          (m.mass ? '<br><span style="color:var(--muted);font-size:0.65rem;">' + measureDisplay(m.mass) + '</span>' : '') +
        '</td>' +
        '<td style="font-family:var(--mono);font-size:0.8rem;">' + pct(m.recycledMassFraction) + '%</td>' +
        '<td>' + hazardBadge(m) + '</td>' +
        '<td style="font-family:var(--mono);font-size:0.75rem;">' + esc(countryDisplay(m.originCountry)) + '</td>' +
      '</tr>';
    }).join('');

    html += '<table class="data-table"><thead><tr>' +
      '<th>Material</th><th>Mass fraction</th><th>Recycled</th><th>Hazard</th><th>Origin</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';

    return html;
  }

  /**
   * Render the supply chain map placeholder. The actual map SVG is
   * fetched from WORLD_MAP_URL by enhanceSupplyChainMap() after the
   * placeholder is in the DOM.
   */
  var _mapEnhanceCfg = null;

  function renderSupplyChainMap(cs) {
    var mats = cs.materialProvenance || cs.materialsProvenance;
    if (!mats || !mats.length) return '';
    var factoryCC = '';
    if (cs.countryOfProduction && cs.countryOfProduction.countryCode) {
      factoryCC = String(cs.countryOfProduction.countryCode).toLowerCase();
    }
    var factoryName = cs.producedAtFacility ? cs.producedAtFacility.name : 'Manufacturing facility';
    var factoryCountryName = cs.countryOfProduction ? (cs.countryOfProduction.countryName || cs.countryOfProduction.countryCode) : '';

    // Collect unique origins (a country may appear in multiple materials)
    var origins = {};
    mats.forEach(function(m, idx) {
      if (!m.originCountry) return;
      var cc = typeof m.originCountry === 'object'
        ? (m.originCountry.countryCode || '').toLowerCase()
        : String(m.originCountry).toLowerCase();
      if (!cc || cc === factoryCC) return;
      if (!origins[cc]) {
        origins[cc] = {
          code: cc,
          name: typeof m.originCountry === 'object'
            ? (m.originCountry.countryName || cc.toUpperCase())
            : cc.toUpperCase(),
          materials: []
        };
      }
      origins[cc].materials.push({ name: m.name, idx: idx, mass: m.massFraction });
    });

    // Stash config for enhanceSupplyChainMap() to pick up post-render
    _mapEnhanceCfg = {
      factoryCC: factoryCC,
      factoryName: factoryName,
      factoryCountryName: factoryCountryName,
      origins: origins
    };

    return '<div class="supply-map-wrap" id="supply-map-wrap">' +
        '<div id="supply-map-slot" style="min-height:240px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-family:var(--mono);font-size:0.8rem;letter-spacing:0.05em;">Loading map…</div>' +
        '<div class="map-tooltip" id="map-tooltip"></div>' +
        '<div class="map-legend">' +
          '<div class="map-legend-item"><span class="map-legend-dot factory"></span>Manufacturing facility (' + esc(factoryCountryName) + ')</div>' +
          '<div class="map-legend-item"><span class="map-legend-dot"></span>Material origin (hover to highlight)</div>' +
        '</div>' +
      '</div>';
  }

  /**
   * Fetch the world map, inject it into the placeholder, then compute
   * centroids from country paths, draw origin dots / connection lines /
   * factory marker, and wire up hover cross-highlighting with the
   * materials table.
   */
  function enhanceSupplyChainMap() {
    var cfg = _mapEnhanceCfg;
    if (!cfg) return;
    var slot = document.getElementById('supply-map-slot');
    if (!slot) return;

    fetch(WORLD_MAP_URL)
      .then(function(resp) {
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return resp.text();
      })
      .then(function(svgText) {
        slot.outerHTML = svgText;
        _enhanceMap(cfg);
      })
      .catch(function(err) {
        slot.textContent = 'Map unavailable (' + err.message + ')';
      });
  }

  function _enhanceMap(cfg) {
    var wrap = document.getElementById('supply-map-wrap');
    if (!wrap) return;
    var svg = wrap.querySelector('svg');
    if (!svg) return;
    svg.setAttribute('class', 'supply-map-svg');
    svg.removeAttribute('width');
    svg.removeAttribute('height');
    svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

    var tooltip = document.getElementById('map-tooltip');

    function centroid(cc) {
      var el = svg.querySelector('#' + cc);
      if (!el) return null;
      var mainland = el.querySelector('.mainland');
      var target = mainland || el;
      try {
        var bb = target.getBBox();
        return { x: bb.x + bb.width / 2, y: bb.y + bb.height / 2 };
      } catch (e) { return null; }
    }

    function showTooltip(html, evt) {
      tooltip.innerHTML = html;
      tooltip.classList.add('visible');
      positionTooltip(evt);
    }
    function positionTooltip(evt) {
      var rect = wrap.getBoundingClientRect();
      var x = evt.clientX - rect.left + 12;
      var y = evt.clientY - rect.top + 12;
      if (x + 280 > rect.width) x = evt.clientX - rect.left - 280;
      if (y + 100 > rect.height) y = evt.clientY - rect.top - 100;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }
    function hideTooltip() { tooltip.classList.remove('visible'); }

    // Mark factory country
    if (cfg.factoryCC) {
      var factoryPath = svg.querySelector('#' + cfg.factoryCC);
      if (factoryPath) {
        var fp = factoryPath.querySelector('.mainland') || factoryPath;
        fp.classList.add('factory-country');
      }
    }

    // Mark origin countries
    Object.keys(cfg.origins).forEach(function(cc) {
      var el = svg.querySelector('#' + cc);
      if (!el) return;
      var path = el.querySelector('.mainland') || el;
      path.classList.add('origin-country');
      path.setAttribute('data-cc', cc);
    });

    var factoryC = cfg.factoryCC ? centroid(cfg.factoryCC) : null;

    // Draw lines first, then dots on top
    var linesG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    var dotsG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    var labelsG = document.createElementNS('http://www.w3.org/2000/svg', 'g');

    var originList = [];
    Object.keys(cfg.origins).forEach(function(k) { originList.push(cfg.origins[k]); });

    originList.forEach(function(origin, i) {
      var c = centroid(origin.code);
      if (!c) return;

      // Curved connection line, arcing upward
      if (factoryC) {
        var midX = (c.x + factoryC.x) / 2;
        var midY = Math.min(c.y, factoryC.y) - Math.abs(c.x - factoryC.x) * 0.2 - 20;
        var line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        line.setAttribute('d', 'M ' + c.x + ' ' + c.y + ' Q ' + midX + ' ' + midY + ' ' + factoryC.x + ' ' + factoryC.y);
        line.setAttribute('class', 'supply-line');
        var dist = Math.sqrt(Math.pow(c.x - factoryC.x, 2) + Math.pow(c.y - factoryC.y, 2)) * 1.6;
        line.style.strokeDasharray = dist;
        line.style.strokeDashoffset = dist;
        line.style.animationDelay = (0.3 + i * 0.25) + 's';
        linesG.appendChild(line);
      }

      // Dot
      var dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', c.x);
      dot.setAttribute('cy', c.y);
      dot.setAttribute('r', 5);
      dot.setAttribute('class', 'origin-dot');
      dot.setAttribute('data-cc', origin.code);
      dotsG.appendChild(dot);

      // Country code label
      var label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      label.setAttribute('x', c.x);
      label.setAttribute('y', c.y - 9);
      label.setAttribute('text-anchor', 'middle');
      label.setAttribute('class', 'map-label');
      label.textContent = origin.code.toUpperCase();
      labelsG.appendChild(label);

      // Interactions
      dot.addEventListener('mouseenter', function(evt) {
        highlightCountry(origin.code, true);
        var matsHtml = origin.materials.map(function(m) {
          return '<div style="margin-bottom:4px;line-height:1.4;">• ' + m.name +
            ' <span style="color:var(--muted)">(' + Math.round((m.mass || 0) * 100) + '%)</span></div>';
        }).join('');
        showTooltip('<div class="map-tooltip-title">' + origin.name + '</div>' + matsHtml, evt);
      });
      dot.addEventListener('mousemove', positionTooltip);
      dot.addEventListener('mouseleave', function() {
        highlightCountry(origin.code, false);
        hideTooltip();
      });
    });

    // Factory marker (pulse + solid dot + label)
    if (factoryC) {
      var pulse = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      pulse.setAttribute('cx', factoryC.x);
      pulse.setAttribute('cy', factoryC.y);
      pulse.setAttribute('r', 4);
      pulse.setAttribute('class', 'factory-dot-pulse');
      dotsG.appendChild(pulse);

      var fDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      fDot.setAttribute('cx', factoryC.x);
      fDot.setAttribute('cy', factoryC.y);
      fDot.setAttribute('r', 5);
      fDot.setAttribute('class', 'factory-dot');
      dotsG.appendChild(fDot);

      var fLabel = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      fLabel.setAttribute('x', factoryC.x);
      fLabel.setAttribute('y', factoryC.y - 10);
      fLabel.setAttribute('text-anchor', 'middle');
      fLabel.setAttribute('class', 'map-label map-label-factory');
      fLabel.textContent = '★ ' + (cfg.factoryCC || '').toUpperCase();
      labelsG.appendChild(fLabel);
    }

    svg.appendChild(linesG);
    svg.appendChild(dotsG);
    svg.appendChild(labelsG);

    // Cross-highlight: hovering a table row highlights the map dot and vice versa
    function highlightCountry(cc, on) {
      var dot = svg.querySelector('.origin-dot[data-cc="' + cc + '"]');
      var countryPath = svg.querySelector('path.origin-country[data-cc="' + cc + '"]');
      if (dot) dot.classList.toggle('active', on);
      if (countryPath) countryPath.classList.toggle('active', on);
      document.querySelectorAll('tr[data-cc="' + cc + '"]').forEach(function(tr) {
        tr.classList.toggle('active', on);
      });
    }

    document.querySelectorAll('tr[data-cc]').forEach(function(tr) {
      var cc = tr.getAttribute('data-cc');
      if (!cc || !cfg.origins[cc]) return;
      tr.addEventListener('mouseenter', function() { highlightCountry(cc, true); });
      tr.addEventListener('mouseleave', function() { highlightCountry(cc, false); });
    });
  }

  function renderDimensions(cs) {
    if (!cs.dimensions) return '';
    var dims = cs.dimensions;
    var html = '<div class="field-grid">';
    var entries = Object.entries(dims).filter(function(e) { return e[0] !== 'type'; });
    if (!entries.length) return '';
    entries.forEach(function(e) {
      var key = e[0], dim = e[1];
      if (dim && typeof dim === 'object' && 'value' in dim) {
        html += field(key, '<span style="font-family:var(--mono)">' + esc(dim.value) + ' <span style="color:var(--muted);font-size:0.75rem;">' + esc(dim.unit) + '</span></span>');
      }
    });
    html += '</div>';
    return html;
  }

  function renderClaims(cs) {
    var claims = cs.performanceClaim;
    if (!claims || !claims.length) return '<p style="color:var(--muted);font-size:0.9rem;">No claims data.</p>';

    // Separate visible claims from access-restricted stubs
    var visible = [];
    var stubs = [];
    claims.forEach(function(c) {
      if (c.accessRole && c.accessRole.length && (!c.claimedPerformance || !c.claimedPerformance.length)) {
        stubs.push(c);
      } else {
        visible.push(c);
      }
    });

    var html = visible.map(function(claim) {
      var topicName = claim.conformityTopic ? claim.conformityTopic.name : '';
      var stdName = (claim.referenceStandard && claim.referenceStandard[0]) ? claim.referenceStandard[0].name : '';

      // Build metrics from claimedPerformance
      var metrics = (claim.claimedPerformance || []).map(function(perf) {
        var metricName = perf.metric ? perf.metric.name : '';
        var val = '';
        var unit = '';
        if (perf.measure) {
          val = perf.measure.value;
          unit = perf.measure.unit || '';
        }
        if (perf.score) {
          val = perf.score.code || perf.score.definition || '';
          unit = '';
        }
        return '<div class="metric-block">' +
          '<div class="metric-type">Claimed performance</div>' +
          '<div class="metric-name-text">' + esc(metricName) + '</div>' +
          '<div><span class="metric-val">' + esc(val) + '</span><span class="metric-unit">' + esc(unit) + '</span></div>' +
        '</div>';
      }).join('');

      // Evidence links
      var evidence = '';
      if (claim.evidence && claim.evidence.length) {
        evidence = '<div style="padding:10px 14px;border-top:1px solid var(--border);">';
        claim.evidence.forEach(function(ev) {
          evidence += '<div style="margin-bottom:6px;">' + extLink(ev.linkURL, ev.linkName || 'View evidence') + '</div>';
        });
        evidence += '</div>';
      }

      return '<div class="claim-block">' +
        '<div class="claim-top"><div>' +
          '<div class="claim-topic">' + esc(topicName) + '</div>' +
          '<div class="claim-name">' + esc(claim.name) + '</div>' +
        '</div></div>' +
        (claim.description ? '<div class="claim-desc">' + esc(claim.description) + '</div>' : '') +
        (metrics ? '<div class="metric-grid">' + metrics + '</div>' : '') +
        evidence +
      '</div>';
    }).join('');

    // Note: access-restricted claim stubs are intentionally not rendered in
    // this consumer-facing (anonymous-role) template — disclosing the
    // existence of role-specific information would leak the UNTP access
    // model to end customers.

    return html;
  }

  function renderDocuments(cs) {
    var docs = cs.relatedDocument;
    if (!docs || !docs.length) return '<p style="color:var(--muted);font-size:0.9rem;">No linked documents.</p>';

    var html = '<ul class="doc-list">';
    docs.forEach(function(doc) {
      var typeLabel = '';
      if (doc.linkType) {
        if (doc.linkType.indexOf('dfr') !== -1) typeLabel = 'DFR';
        else if (doc.linkType.indexOf('dte') !== -1) typeLabel = 'DTE';
        else if (doc.linkType.indexOf('dcc') !== -1) typeLabel = 'DCC';
        else if (doc.linkType.indexOf('dpp') !== -1) typeLabel = 'DPP';
        else typeLabel = 'LINK';
      }
      html += '<li>' +
        (typeLabel ? '<span class="doc-type">' + typeLabel + '</span> ' : '') +
        '<span class="doc-label">' + extLink(doc.linkURL, doc.linkName || 'View document') + '</span>' +
      '</li>';
    });
    html += '</ul>';
    return html;
  }

  function renderCharacteristics(cs) {
    var chars = cs.characteristics;
    if (!chars) return '<p style="color:var(--muted);font-size:0.9rem;">No characteristics data.</p>';

    var html = '';

    // Recycling contaminants
    if (chars.recyclingContaminants && chars.recyclingContaminants.length) {
      html += '<div class="field-label" style="margin-bottom:12px;font-size:0.72rem;">Recycling contaminants</div>';
      chars.recyclingContaminants.forEach(function(c) {
        html += '<div class="contaminant-card">' +
          '<div class="contaminant-name">' + esc(c.substance) + '</div>' +
          '<div class="contaminant-detail"><strong style="color:var(--muted)">Location:</strong> ' + esc(c.location) + '</div>' +
          '<div class="contaminant-detail"><strong style="color:var(--muted)">Recycling impact:</strong> ' + esc(c.recyclingImpact) + '</div>' +
          (c.casNumber ? '<div class="contaminant-cas">CAS ' + esc(c.casNumber) + '</div>' : '') +
        '</div>';
      });
    }

    // Dismantling sequence
    if (chars.dismantlingSequence && chars.dismantlingSequence.length) {
      html += '<div class="field-label" style="margin-top:20px;margin-bottom:12px;font-size:0.72rem;">Dismantling sequence</div>';
      html += '<ul class="step-list">';
      chars.dismantlingSequence.forEach(function(step) {
        // Strip leading number+period if present (we use CSS counters)
        var text = String(step).replace(/^\d+\.\s*/, '');
        html += '<li>' + esc(text) + '</li>';
      });
      html += '</ul>';
    }

    if (!html) {
      // Generic key-value for other characteristics
      Object.entries(chars).forEach(function(e) {
        if (e[0] === 'type') return;
        html += field(e[0], esc(typeof e[1] === 'object' ? JSON.stringify(e[1]) : e[1]), { full: true });
      });
    }

    return html;
  }

  function renderVerifiedBy(cs) {
    if (!cs.performanceClaim || !cs.performanceClaim.length) return '';

    // Collect unique standards from claims that have evidence links.
    // A standard backed by external evidence = independently verified.
    var seen = {};
    var badges = [];
    cs.performanceClaim.forEach(function(claim) {
      if (!claim.evidence || !claim.evidence.length) return;
      var standards = claim.referenceStandard || [];
      standards.forEach(function(std) {
        var key = std.id || std.name;
        if (!key || seen[key]) return;
        seen[key] = true;
        // Use first evidence link as the target (could aggregate, but first is simplest)
        var target = claim.evidence[0].linkURL;
        badges.push({ name: std.name, href: target });
      });
    });

    if (!badges.length) return '';

    var html = '<div class="verified-by">' +
      '<div class="verified-by-label">Independently verified</div>' +
      '<div class="verified-by-badges">';
    badges.forEach(function(b) {
      html += '<a href="' + esc(b.href) + '" target="_blank" class="verified-badge" title="View certificate">' +
        '<span class="verified-badge-dot"></span>' + esc(b.name) +
      '</a>';
    });
    html += '</div></div>';
    return html;
  }

  /**
   * "After you buy" lifecycle preview with live buy-back value estimate.
   *
   * Pricing model: flat premium-outdoor depreciation curve anchored at
   *   yr 0 → 100%, yr 3 → 70%, yr 5 → 50%, yr 8 → 25%, yr 10 → 0%
   * Linear interpolation between anchors. Uses vc.validFrom as the
   * product issuance / "born on" date so the viewer can see that the
   * estimate is derived from the credential itself.
   */
  function renderLifecycle(vc) {
    var PRICE = 590;  // Demo original retail price in EUR
    var CURVE = [
      { year: 0, frac: 1.00 },
      { year: 3, frac: 0.70 },
      { year: 5, frac: 0.50 },
      { year: 8, frac: 0.25 }
    ];

    var validFrom = vc.validFrom;
    if (!validFrom) return '';

    var issuedDate = new Date(validFrom);
    var now = new Date();
    var ageMs = now - issuedDate;
    var ageYears = ageMs / (365.25 * 24 * 3600 * 1000);
    if (ageYears < 0) ageYears = 0;

    // Interpolate the value fraction from the curve.
    // Beyond the last anchor, the value holds at the final fraction
    // (buy-back programme doesn't drop to zero — old jackets still have value).
    var frac;
    var last = CURVE[CURVE.length - 1];
    if (ageYears >= last.year) {
      frac = last.frac;
    } else {
      frac = CURVE[0].frac;
      for (var i = 0; i < CURVE.length - 1; i++) {
        if (ageYears >= CURVE[i].year && ageYears < CURVE[i + 1].year) {
          var span = CURVE[i + 1].year - CURVE[i].year;
          var progress = (ageYears - CURVE[i].year) / span;
          frac = CURVE[i].frac + (CURVE[i + 1].frac - CURVE[i].frac) * progress;
          break;
        }
      }
    }
    var currentValue = Math.round(PRICE * frac);

    // Format issued date for display
    var issuedLabel = issuedDate.toISOString().slice(0, 10);
    var ageLabel = ageYears < 1
      ? (Math.round(ageYears * 12) + ' months old')
      : (ageYears.toFixed(1) + ' years old');

    // Build timeline. Each milestone has a year offset from issuance.
    var milestones = [
      { year: 0,  when: 'At purchase',         what: 'DPP registered to you',
        detail: 'Scan this passport to claim ownership and activate your 2-year manufacturer warranty.' },
      { year: 2,  when: 'Year 2',              what: 'Free DWR re-treatment',
        detail: 'One complimentary durable water-repellent re-treatment at any authorised LayerCoat service centre.' },
      { year: 3,  when: 'Year 3+',             what: 'Repair service network',
        detail: 'Zip replacement, seam re-taping, fabric patching. 20+ authorised repair centres across Europe.' },
      { year: 5,  when: 'Year 5',              what: 'Lifetime seam guarantee check',
        detail: 'Free inspection and re-taping of all critical seams — because a hardshell is only as good as its seams.' },
      { year: 7,  when: 'Any time',            what: 'Buy-back programme',
        detail: 'Return your X3 and receive store credit based on age and condition. We refurbish and resell, or recycle responsibly.' },
      { year: 10, when: 'End of life',         what: 'Closed-loop recycling',
        detail: 'Free return drop-off. Face fabric and fleece enter our rNylon/rPET streams; membrane and trim go to specialist processors.' }
    ];

    var timelineHtml = '<div class="timeline">';
    milestones.forEach(function(m) {
      var cls = 'timeline-item';
      if (Math.abs(ageYears - m.year) < 0.5) cls += ' current';
      else if (m.year > ageYears) cls += ' future';
      else cls += ' past';
      timelineHtml += '<div class="' + cls + '">' +
        '<div class="timeline-when">' + esc(m.when) + '</div>' +
        '<div class="timeline-what">' + esc(m.what) + '</div>' +
        '<div class="timeline-detail">' + esc(m.detail) + '</div>' +
      '</div>';
    });
    timelineHtml += '</div>';

    var buybackHtml =
      '<div class="buyback-callout">' +
        '<div class="buyback-callout-label">Buy-back estimate — today</div>' +
        '<div class="buyback-value-row">' +
          '<span class="buyback-value">€' + currentValue + '</span>' +
          '<span class="buyback-of">of €' + PRICE + ' original</span>' +
        '</div>' +
        '<div class="buyback-provenance">' +
          'Based on DPP issued <strong>' + esc(issuedLabel) + '</strong> · ' + esc(ageLabel) + ' · ' +
          'subject to condition inspection at buy-back' +
        '</div>' +
      '</div>';

    var imageHtml =
      '<div class="lifecycle-image-area">' +
        '<img src="https://elehta.github.io/layercoat_buyback.jpg" class="lifecycle-image" ' +
          'onerror="this.onerror=null;this.outerHTML=\'<div class=&quot;lifecycle-image-placeholder&quot;>Illustration: a well-worn X3 jacket folded on a wooden crate stamped with the LayerCoat logo — the buy-back return point</div>\';" ' +
          'alt="LayerCoat buy-back programme">' +
        '<div class="lifecycle-image-caption">The return, the second life</div>' +
      '</div>';

    return '<div class="lifecycle-layout">' +
      '<div>' + buybackHtml + timelineHtml + '</div>' +
      imageHtml +
    '</div>';
  }

  // ── Bootstrap ──────────────────────────────────────────────────────────────

  try {
    var vcScript = document.querySelector('script[type="application/vc"]');
    if (!vcScript) throw new Error('No credential data block found.');

    var vc = JSON.parse(vcScript.textContent);
    var cs = vc.credentialSubject;

    var imgSrc = cs.productImage ? (cs.productImage.linkURL || cs.productImage.id || null) : null;
    var manufacturer = findParty(cs, 'manufacturer');
    var facility = cs.producedAtFacility;

    document.getElementById('dpp-root').innerHTML =
      '<div class="dpp-header">' +
        '<div class="dpp-header-text">' +
          '<div class="dpp-eyebrow">Digital Product Passport</div>' +
          '<div class="dpp-title">' + esc(cs.name) + '</div>' +
          '<div class="dpp-subtitle">' + esc(cs.id) + '</div>' +
        '</div>' +
        '<div class="dpp-logo-area">' +
          '<img src="https://elehta.github.io/layercoat_logo.png" class="dpp-logo" alt="LayerCoat" onerror="this.onerror=null;this.style.display=\'none\';">' +
        '</div>' +
      '</div>' +

      '<div class="meta-strip">' +
        (manufacturer ? '<div class="meta-cell"><div class="meta-cell-label">Manufacturer</div><div class="meta-cell-value">' + esc(manufacturer.name) + '</div></div>' : '') +
        (facility ? '<div class="meta-cell"><div class="meta-cell-label">Facility</div><div class="meta-cell-value">' + esc(facility.name) + '</div></div>' : '') +
        '<div class="meta-cell"><div class="meta-cell-label">Country</div><div class="meta-cell-value">' + esc(countryDisplay(cs.countryOfProduction)) + '</div></div>' +
        (cs.modelNumber ? '<div class="meta-cell"><div class="meta-cell-label">Model</div><div class="meta-cell-value">' + esc(cs.modelNumber) + '</div></div>' : '') +
      '</div>' +

      renderVerifiedBy(cs) +

      section(1, 'Identity & Product Info',        renderIdentity(vc, cs),    0.05) +
      section(2, 'Issuer & Validity',               renderIssuer(vc),          0.10) +
      section(3, 'Material Provenance',              renderMaterials(cs),       0.15) +
      section(4, 'Global Supply Chain',              renderSupplyChainMap(cs),  0.18) +
      (renderDimensions(cs) ? section(5, 'Dimensions', renderDimensions(cs), 0.20) : '') +
      section(6, 'Performance Claims & Conformity',  renderClaims(cs),          0.25) +
      section(7, 'Linked Documents & Traceability',  renderDocuments(cs),       0.30) +
      section(8, 'Characteristics & End-of-Life',    renderCharacteristics(cs), 0.35) +
      '<div class="extra-divider"><span class="extra-divider-label">LayerCoat programme</span></div>' +
      section(9, 'After You Buy — Lifecycle & Buy-back', renderLifecycle(vc),   0.40,
              { modifier: 'section-lifecycle', extraTag: 'Extra' });

    // After all markup is in the DOM, enhance the map (computes centroids,
    // draws dots and connection lines, wires up interactions).
    enhanceSupplyChainMap();

  } catch (err) {
    document.getElementById('dpp-root').innerHTML =
      '<div style="color:#ff3d5a;padding:20px;font-family:monospace;">Error: ' + esc(err.message) + '</div>';
  }
</script>
