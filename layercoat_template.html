<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

  :root { --bg: #3f4146; --surface: #484b51; --surface2: #52555c; --border: #6b6f78; --accent: #00c98a; --danger: #ff3d5a; --warn: #ffb800; --muted: #c0c4cc; --text: #f0f2f5; --text-dim: #d0d4dc; --mono: 'Space Mono', monospace; --sans: 'Plus Jakarta Sans', sans-serif; }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 17px; line-height: 1.6; }
  #dpp-root { max-width: 860px; margin: 0 auto; padding-top: 60px; padding-bottom: 30px; padding-left: 16px; padding-right: 16px; }

  .dpp-header { display: grid; grid-template-columns: 1fr 25%; align-items: start; gap: 20px; padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 28px; animation: fadeDown 0.4s ease both; }
  .dpp-header-text { min-width: 0; }
  .dpp-eyebrow { font-family: var(--mono); font-size: 0.78rem; letter-spacing: 0.2em; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  .dpp-title { font-size: 2.4rem; font-weight: 800; line-height: 1.1; letter-spacing: -0.01em; text-transform: uppercase; color: #fff; }
  .dpp-subtitle { font-family: var(--mono); font-size: 0.78rem; color: var(--text-dim); margin-top: 10px; word-break: break-all; }
  .dpp-logo-area { display: flex; align-items: flex-start; justify-content: flex-end; }
  .dpp-logo { width: 100%; max-width: 180px; height: auto; object-fit: contain; }
  .dpp-image { width: 120px; height: 120px; object-fit: cover; border: 1px solid var(--border); filter: grayscale(20%); }

  .meta-strip { display: flex; gap: 0; margin-bottom: 28px; border: 1px solid var(--border); overflow: hidden; animation: fadeUp 0.4s 0.1s ease both; flex-wrap: wrap; }
  .meta-cell { flex: 1; min-width: 140px; padding: 12px 16px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .meta-cell:last-child { border-right: none; }
  .meta-cell-label { font-family: var(--mono); font-size: 0.68rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .meta-cell-value { font-size: 1.05rem; font-weight: 600; color: var(--text); }

  .section { margin-bottom: 20px; border: 1px solid var(--border); background: var(--surface); animation: fadeUp 0.4s ease both; }
  .section-header { display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .section-header:hover { background: #585b62; }
  .section-number { font-family: var(--mono); font-size: 1rem; color: var(--accent); opacity: 0.7; }
  .section-title { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); flex: 1; }
  .section-toggle { font-family: var(--mono); font-size: 0.75rem; color: var(--muted); transition: transform 0.2s; }
  .section-body { padding: 16px; }
  .section.collapsed .section-body { display: none; }
  .section.collapsed .section-toggle { transform: rotate(-90deg); }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 16px; }
  .field { background: var(--surface); padding: 12px 14px; }
  .field.full { grid-column: span 2; }
  .field-label { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .field-value { font-size: 1.05rem; font-weight: 600; color: var(--text); word-break: break-word; }
  .field-value.mono { font-family: var(--mono); font-size: 0.76rem; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 1rem; }
  .data-table th { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; font-weight: 400; }
  .data-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface2); }

  .badge { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.1em; font-weight: 700; padding: 3px 8px; text-transform: uppercase; display: inline-block; }
  .badge-safe       { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .badge-hazard     { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .badge-unknown    { background: transparent; color: var(--warn);   border: 1px solid var(--warn); }

  .score-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .score-row:last-child { margin-bottom: 0; }
  .score-label { font-family: var(--mono); font-size: 0.72rem; color: var(--text-dim); width: 180px; flex-shrink: 0; letter-spacing: 0.05em; }
  .score-track { flex: 1; height: 4px; background: var(--border); position: relative; }
  .score-fill { height: 100%; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1); }
  .score-fill-high { background: var(--accent); }
  .score-fill-mid  { background: var(--warn); }
  .score-fill-low  { background: var(--danger); }
  .score-value { font-family: var(--mono); font-size: 0.78rem; color: var(--text); width: 50px; text-align: right; flex-shrink: 0; }

  .claim-block { border: 1px solid var(--border); margin-bottom: 12px; }
  .claim-block:last-child { margin-bottom: 0; }
  .claim-top { display: flex; justify-content: space-between; align-items: flex-start; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); gap: 12px; }
  .claim-topic { font-family: var(--mono); font-size: 0.68rem; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 4px; }
  .claim-name { font-size: 1.05rem; font-weight: 700; color: var(--text); }
  .claim-desc { font-size: 0.88rem; color: var(--text-dim); line-height: 1.5; padding: 12px 14px; }
  .claim-name a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--muted); }
  .claim-name a:hover { border-color: var(--accent); color: var(--accent); }

  .claim-stub { border: 1px solid var(--border); margin-bottom: 12px; padding: 14px; background: var(--surface2); opacity: 0.6; }
  .claim-stub-lock { font-size: 1rem; margin-right: 8px; }
  .claim-stub-name { font-weight: 600; color: var(--text-dim); }
  .claim-stub-role { font-family: var(--mono); font-size: 0.68rem; color: var(--warn); margin-top: 4px; letter-spacing: 0.1em; }

  .metric-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1px; background: var(--border); }
  .metric-block { background: var(--surface); padding: 12px 14px; }
  .metric-type { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 6px; color: var(--accent); }
  .metric-name-text { font-size: 0.88rem; font-weight: 600; margin-bottom: 4px; color: var(--text-dim); }
  .metric-val { font-family: var(--mono); font-size: 1.15rem; font-weight: 700; color: #fff; }
  .metric-unit { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); margin-left: 4px; }

  .ext-link { font-family: var(--mono); font-size: 0.74rem; color: var(--accent); text-decoration: none; letter-spacing: 0.05em; border-bottom: 1px solid transparent; transition: border-color 0.15s; }
  .ext-link:hover { border-color: var(--accent); }

  .doc-list { list-style: none; padding: 0; }
  .doc-list li { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .doc-list li:last-child { border-bottom: none; }
  .doc-label { font-size: 0.95rem; font-weight: 600; color: var(--text); display: block; margin-bottom: 4px; }
  .doc-type { font-family: var(--mono); font-size: 0.66rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .contaminant-card { border: 1px solid var(--border); margin-bottom: 12px; padding: 14px; background: var(--surface2); }
  .contaminant-card:last-child { margin-bottom: 0; }
  .contaminant-name { font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .contaminant-detail { font-size: 0.88rem; color: var(--text-dim); line-height: 1.5; margin-bottom: 4px; }
  .contaminant-cas { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); }

  .step-list { list-style: none; padding: 0; counter-reset: step; }
  .step-list li { padding: 10px 0 10px 40px; border-bottom: 1px solid var(--border); position: relative; font-size: 0.95rem; color: var(--text-dim); line-height: 1.5; }
  .step-list li:last-child { border-bottom: none; }
  .step-list li::before { counter-increment: step; content: counter(step); position: absolute; left: 0; font-family: var(--mono); font-size: 0.85rem; font-weight: 700; color: var(--accent); width: 28px; text-align: center; }

  .variant-notice { font-family: var(--mono); font-size: 0.72rem; color: var(--muted); padding: 10px 14px; border: 1px dashed var(--border); margin-top: 16px; letter-spacing: 0.05em; }

  /* Verified-by trust badges — surfaced right under the meta-strip */
  .verified-by { margin-bottom: 28px; padding: 14px 16px; border: 1px solid var(--border); background: var(--surface); animation: fadeUp 0.4s 0.12s ease both; }
  .verified-by-label { font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.15em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .verified-by-label::before { content: '✓'; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; background: var(--accent); color: #000; font-size: 0.7rem; font-weight: 900; border-radius: 50%; }
  .verified-by-badges { display: flex; flex-wrap: wrap; gap: 8px; }
  .verified-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border: 1px solid var(--accent); color: var(--text); text-decoration: none; font-size: 0.82rem; font-weight: 600; transition: background 0.15s, color 0.15s; }
  .verified-badge:hover { background: var(--accent); color: #000; }
  .verified-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .verified-badge:hover .verified-badge-dot { background: #000; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(10px);  } to { opacity: 1; transform: translateY(0); } }

  .section:nth-child(1) { animation-delay: 0.05s; }
  .section:nth-child(2) { animation-delay: 0.10s; }
  .section:nth-child(3) { animation-delay: 0.15s; }
  .section:nth-child(4) { animation-delay: 0.20s; }
  .section:nth-child(5) { animation-delay: 0.25s; }
  .section:nth-child(6) { animation-delay: 0.30s; }
  .section:nth-child(7) { animation-delay: 0.35s; }
  .section:nth-child(8) { animation-delay: 0.40s; }
  .section:nth-child(9) { animation-delay: 0.45s; }

  @media (max-width: 600px) {
    .dpp-header { grid-template-columns: 1fr; gap: 16px; }
    .dpp-logo-area { justify-content: flex-start; }
    .dpp-logo { max-width: 120px; }
    .dpp-title { font-size: 1.6rem; }
    .meta-strip { flex-direction: column; }
    .meta-cell { border-right: none; }
    .field-grid { grid-template-columns: 1fr; }
    .field.full { grid-column: span 1; }
    .score-label { width: 120px; }
    .metric-grid { grid-template-columns: 1fr; }
  }
</style>

<div id="dpp-root"></div>

<script>
  // ── Helpers ────────────────────────────────────────────────────────────────

  function esc(v) {
    if (v === null || v === undefined) return '';
    return String(v)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function pct(v) { return Math.round((v || 0) * 100); }

  function scoreClass(v) {
    if (v >= 0.67) return 'score-fill-high';
    if (v >= 0.33) return 'score-fill-mid';
    return 'score-fill-low';
  }

  /** Resolve country — handles both string codes and UNTP Country objects */
  function countryDisplay(c) {
    if (!c) return '';
    if (typeof c === 'string') return c;
    if (c.countryName && c.countryCode) return c.countryName + ' (' + c.countryCode + ')';
    return c.countryName || c.countryCode || '';
  }

  /** Find a party by role in relatedParty array */
  function findParty(cs, role) {
    if (!cs.relatedParty) return null;
    const rp = cs.relatedParty.find(p => p.role === role);
    return rp ? rp.party : null;
  }

  /** Format a Measure object { value, unit } */
  function measureDisplay(m) {
    if (!m) return '';
    return esc(m.value) + ' ' + esc(m.unit || '');
  }

  function scoreRow(label, value) {
    return '<div class="score-row">' +
      '<span class="score-label">' + label + '</span>' +
      '<div class="score-track"><div class="score-fill ' + scoreClass(value) + '" style="width:' + pct(value) + '%"></div></div>' +
      '<span class="score-value">' + pct(value) + '%</span></div>';
  }

  function field(label, value, opts) {
    opts = opts || {};
    var cls = 'field' + (opts.full ? ' full' : '');
    var valCls = 'field-value' + (opts.mono ? ' mono' : '');
    return '<div class="' + cls + '"><div class="field-label">' + label + '</div><div class="' + valCls + '">' + value + '</div></div>';
  }

  function section(number, title, body, delay) {
    return '<div class="section" style="animation-delay:' + delay + 's">' +
      '<div class="section-header" onclick="this.parentElement.classList.toggle(\'collapsed\')">' +
      '<span class="section-number">' + String(number).padStart(2, '0') + '</span>' +
      '<span class="section-title">' + title + '</span>' +
      '<span class="section-toggle">▼</span></div>' +
      '<div class="section-body">' + body + '</div></div>';
  }

  function hazardBadge(m) {
    if (!('hazardous' in m)) return '<span class="badge badge-unknown">Unknown</span>';
    return m.hazardous
      ? '<span class="badge badge-hazard">Hazardous</span>'
      : '<span class="badge badge-safe">Safe</span>';
  }

  function extLink(url, label) {
    return '<a href="' + esc(url) + '" target="_blank" class="ext-link">' + esc(label) + ' ↗</a>';
  }

  // ── Section renderers (UNTP v0.7.0 schema) ────────────────────────────────

  function renderIdentity(vc, cs) {
    var manufacturer = findParty(cs, 'manufacturer');
    var brandOwner = findParty(cs, 'brandOwner');
    var facility = cs.producedAtFacility;
    var category = (cs.productCategory && cs.productCategory[0]) || null;

    var html = '<div class="field-grid">';
    html += field('Product name', esc(cs.name), { full: true });
    if (manufacturer) html += field('Manufacturer', esc(manufacturer.name));
    if (brandOwner && brandOwner.name !== (manufacturer && manufacturer.name))
      html += field('Brand owner', esc(brandOwner.name));
    html += field('Country of production', esc(countryDisplay(cs.countryOfProduction)));
    if (facility) html += field('Production facility', esc(facility.name));
    if (cs.modelNumber) html += field('Model number', esc(cs.modelNumber));
    if (cs.idGranularity) html += field('Granularity', esc(cs.idGranularity));
    if (cs.batchNumber) html += field('Batch number', esc(cs.batchNumber));
    if (cs.serialNumber) html += field('Serial number', esc(cs.serialNumber));
    if (cs.itemNumber) html += field('Item number', esc(cs.itemNumber));
    if (category) html += field('Product category', esc(category.name) + '<br><span style="font-family:var(--mono);font-size:0.72rem;color:var(--muted)">' + esc(category.schemeName) + ' ' + esc(category.code) + '</span>', { full: true });
    html += field('Credential ID', esc(cs.id), { full: true, mono: true });
    html += '</div>';

    if (cs.description) {
      html += '<div style="font-size:0.95rem;color:var(--text-dim);line-height:1.6;padding:8px 2px;">' + esc(cs.description) + '</div>';
    }

    return html;
  }

  function renderIssuer(vc) {
    var iss = vc.issuer;
    if (!iss) return '<p style="color:var(--muted);font-size:0.9rem;">No issuer data.</p>';

    var html = '<div class="field-grid">';
    html += field('Issuer name', esc(iss.name), { full: true });
    html += field('Issuer DID', esc(iss.id), { full: true, mono: true });
    html += field('Valid from', esc(vc.validFrom));
    html += field('Valid until', esc(vc.validUntil));
    html += '</div>';

    if (iss.issuerAlsoKnownAs && iss.issuerAlsoKnownAs.length) {
      html += '<div style="margin-top:12px;"><div class="field-label" style="margin-bottom:8px;">Also known as</div>';
      iss.issuerAlsoKnownAs.forEach(function(aka) {
        html += '<div style="margin-bottom:6px;">' + esc(aka.name);
        if (aka.registeredId) html += ' <span style="font-family:var(--mono);font-size:0.75rem;color:var(--muted)">(' + esc(aka.registeredId) + ')</span>';
        html += '</div>';
      });
      html += '</div>';
    }

    return html;
  }

  function renderMaterials(cs) {
    var mats = cs.materialProvenance || cs.materialsProvenance;
    if (!mats || !mats.length) return '<p style="color:var(--muted);font-size:0.9rem;">No material data.</p>';

    // Summary bar
    var totalRecycled = 0;
    mats.forEach(function(m) { totalRecycled += (m.massFraction || 0) * (m.recycledMassFraction || 0); });
    var html = '<div style="margin-bottom:16px;">' + scoreRow('Overall recycled content', totalRecycled) + '</div>';

    var rows = mats.map(function(m) {
      return '<tr>' +
        '<td>' + esc(m.name) + '</td>' +
        '<td style="font-family:var(--mono);font-size:0.8rem;">' + pct(m.massFraction) + '%' +
          (m.mass ? '<br><span style="color:var(--muted);font-size:0.65rem;">' + measureDisplay(m.mass) + '</span>' : '') +
        '</td>' +
        '<td style="font-family:var(--mono);font-size:0.8rem;">' + pct(m.recycledMassFraction) + '%</td>' +
        '<td>' + hazardBadge(m) + '</td>' +
        '<td style="font-family:var(--mono);font-size:0.75rem;">' + esc(countryDisplay(m.originCountry)) + '</td>' +
      '</tr>';
    }).join('');

    html += '<table class="data-table"><thead><tr>' +
      '<th>Material</th><th>Mass fraction</th><th>Recycled</th><th>Hazard</th><th>Origin</th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';

    return html;
  }

  function renderDimensions(cs) {
    if (!cs.dimensions) return '';
    var dims = cs.dimensions;
    var html = '<div class="field-grid">';
    var entries = Object.entries(dims).filter(function(e) { return e[0] !== 'type'; });
    if (!entries.length) return '';
    entries.forEach(function(e) {
      var key = e[0], dim = e[1];
      if (dim && typeof dim === 'object' && 'value' in dim) {
        html += field(key, '<span style="font-family:var(--mono)">' + esc(dim.value) + ' <span style="color:var(--muted);font-size:0.75rem;">' + esc(dim.unit) + '</span></span>');
      }
    });
    html += '</div>';
    return html;
  }

  function renderClaims(cs) {
    var claims = cs.performanceClaim;
    if (!claims || !claims.length) return '<p style="color:var(--muted);font-size:0.9rem;">No claims data.</p>';

    // Separate visible claims from access-restricted stubs
    var visible = [];
    var stubs = [];
    claims.forEach(function(c) {
      if (c.accessRole && c.accessRole.length && (!c.claimedPerformance || !c.claimedPerformance.length)) {
        stubs.push(c);
      } else {
        visible.push(c);
      }
    });

    var html = visible.map(function(claim) {
      var topicName = claim.conformityTopic ? claim.conformityTopic.name : '';
      var stdName = (claim.referenceStandard && claim.referenceStandard[0]) ? claim.referenceStandard[0].name : '';

      // Build metrics from claimedPerformance
      var metrics = (claim.claimedPerformance || []).map(function(perf) {
        var metricName = perf.metric ? perf.metric.name : '';
        var val = '';
        var unit = '';
        if (perf.measure) {
          val = perf.measure.value;
          unit = perf.measure.unit || '';
        }
        if (perf.score) {
          val = perf.score.code || perf.score.definition || '';
          unit = '';
        }
        return '<div class="metric-block">' +
          '<div class="metric-type">Claimed performance</div>' +
          '<div class="metric-name-text">' + esc(metricName) + '</div>' +
          '<div><span class="metric-val">' + esc(val) + '</span><span class="metric-unit">' + esc(unit) + '</span></div>' +
        '</div>';
      }).join('');

      // Evidence links
      var evidence = '';
      if (claim.evidence && claim.evidence.length) {
        evidence = '<div style="padding:10px 14px;border-top:1px solid var(--border);">';
        claim.evidence.forEach(function(ev) {
          evidence += '<div style="margin-bottom:6px;">' + extLink(ev.linkURL, ev.linkName || 'View evidence') + '</div>';
        });
        evidence += '</div>';
      }

      return '<div class="claim-block">' +
        '<div class="claim-top"><div>' +
          '<div class="claim-topic">' + esc(topicName) + '</div>' +
          '<div class="claim-name">' + esc(claim.name) + '</div>' +
        '</div></div>' +
        (claim.description ? '<div class="claim-desc">' + esc(claim.description) + '</div>' : '') +
        (metrics ? '<div class="metric-grid">' + metrics + '</div>' : '') +
        evidence +
      '</div>';
    }).join('');

    // Render stubs (access-restricted claims)
    if (stubs.length) {
      html += '<div style="margin-top:16px;">';
      stubs.forEach(function(stub) {
        var roles = (stub.accessRole || []).map(function(r) {
          return r.replace('untp:accessRole#', '');
        }).join(', ');
        html += '<div class="claim-stub">' +
          '<span class="claim-stub-lock">🔒</span>' +
          '<span class="claim-stub-name">' + esc(stub.name) + '</span>' +
          '<div class="claim-stub-role">Available to: ' + esc(roles) + '</div>' +
        '</div>';
      });
      html += '</div>';
    }

    return html;
  }

  function renderDocuments(cs) {
    var docs = cs.relatedDocument;
    if (!docs || !docs.length) return '<p style="color:var(--muted);font-size:0.9rem;">No linked documents.</p>';

    var html = '<ul class="doc-list">';
    docs.forEach(function(doc) {
      var typeLabel = '';
      if (doc.linkType) {
        if (doc.linkType.indexOf('dfr') !== -1) typeLabel = 'DFR';
        else if (doc.linkType.indexOf('dte') !== -1) typeLabel = 'DTE';
        else if (doc.linkType.indexOf('dcc') !== -1) typeLabel = 'DCC';
        else if (doc.linkType.indexOf('dpp') !== -1) typeLabel = 'DPP';
        else typeLabel = 'LINK';
      }
      html += '<li>' +
        (typeLabel ? '<span class="doc-type">' + typeLabel + '</span> ' : '') +
        '<span class="doc-label">' + extLink(doc.linkURL, doc.linkName || 'View document') + '</span>' +
      '</li>';
    });
    html += '</ul>';
    return html;
  }

  function renderCharacteristics(cs) {
    var chars = cs.characteristics;
    if (!chars) return '<p style="color:var(--muted);font-size:0.9rem;">No characteristics data.</p>';

    var html = '';

    // Recycling contaminants
    if (chars.recyclingContaminants && chars.recyclingContaminants.length) {
      html += '<div class="field-label" style="margin-bottom:12px;font-size:0.72rem;">Recycling contaminants</div>';
      chars.recyclingContaminants.forEach(function(c) {
        html += '<div class="contaminant-card">' +
          '<div class="contaminant-name">' + esc(c.substance) + '</div>' +
          '<div class="contaminant-detail"><strong style="color:var(--muted)">Location:</strong> ' + esc(c.location) + '</div>' +
          '<div class="contaminant-detail"><strong style="color:var(--muted)">Recycling impact:</strong> ' + esc(c.recyclingImpact) + '</div>' +
          (c.casNumber ? '<div class="contaminant-cas">CAS ' + esc(c.casNumber) + '</div>' : '') +
        '</div>';
      });
    }

    // Dismantling sequence
    if (chars.dismantlingSequence && chars.dismantlingSequence.length) {
      html += '<div class="field-label" style="margin-top:20px;margin-bottom:12px;font-size:0.72rem;">Dismantling sequence</div>';
      html += '<ul class="step-list">';
      chars.dismantlingSequence.forEach(function(step) {
        // Strip leading number+period if present (we use CSS counters)
        var text = String(step).replace(/^\d+\.\s*/, '');
        html += '<li>' + esc(text) + '</li>';
      });
      html += '</ul>';
    }

    if (!html) {
      // Generic key-value for other characteristics
      Object.entries(chars).forEach(function(e) {
        if (e[0] === 'type') return;
        html += field(e[0], esc(typeof e[1] === 'object' ? JSON.stringify(e[1]) : e[1]), { full: true });
      });
    }

    return html;
  }

  function renderVerifiedBy(cs) {
    if (!cs.performanceClaim || !cs.performanceClaim.length) return '';

    // Collect unique standards from claims that have evidence links.
    // A standard backed by external evidence = independently verified.
    var seen = {};
    var badges = [];
    cs.performanceClaim.forEach(function(claim) {
      if (!claim.evidence || !claim.evidence.length) return;
      var standards = claim.referenceStandard || [];
      standards.forEach(function(std) {
        var key = std.id || std.name;
        if (!key || seen[key]) return;
        seen[key] = true;
        // Use first evidence link as the target (could aggregate, but first is simplest)
        var target = claim.evidence[0].linkURL;
        badges.push({ name: std.name, href: target });
      });
    });

    if (!badges.length) return '';

    var html = '<div class="verified-by">' +
      '<div class="verified-by-label">Independently verified</div>' +
      '<div class="verified-by-badges">';
    badges.forEach(function(b) {
      html += '<a href="' + esc(b.href) + '" target="_blank" class="verified-badge" title="View certificate">' +
        '<span class="verified-badge-dot"></span>' + esc(b.name) +
      '</a>';
    });
    html += '</div></div>';
    return html;
  }

  // ── Bootstrap ──────────────────────────────────────────────────────────────

  try {
    var vcScript = document.querySelector('script[type="application/vc"]');
    if (!vcScript) throw new Error('No credential data block found.');

    var vc = JSON.parse(vcScript.textContent);
    var cs = vc.credentialSubject;

    var imgSrc = cs.productImage ? (cs.productImage.linkURL || cs.productImage.id || null) : null;
    var manufacturer = findParty(cs, 'manufacturer');
    var facility = cs.producedAtFacility;

    document.getElementById('dpp-root').innerHTML =
      '<div class="dpp-header">' +
        '<div class="dpp-header-text">' +
          '<div class="dpp-eyebrow">Digital Product Passport</div>' +
          '<div class="dpp-title">' + esc(cs.name) + '</div>' +
          '<div class="dpp-subtitle">' + esc(cs.id) + '</div>' +
        '</div>' +
        '<div class="dpp-logo-area">' +
          '<img src="https://elehta.github.io/layercoat_logo.png" class="dpp-logo" alt="LayerCoat" onerror="this.onerror=null;this.style.display=\'none\';">' +
        '</div>' +
      '</div>' +

      '<div class="meta-strip">' +
        (manufacturer ? '<div class="meta-cell"><div class="meta-cell-label">Manufacturer</div><div class="meta-cell-value">' + esc(manufacturer.name) + '</div></div>' : '') +
        (facility ? '<div class="meta-cell"><div class="meta-cell-label">Facility</div><div class="meta-cell-value">' + esc(facility.name) + '</div></div>' : '') +
        '<div class="meta-cell"><div class="meta-cell-label">Country</div><div class="meta-cell-value">' + esc(countryDisplay(cs.countryOfProduction)) + '</div></div>' +
        (cs.modelNumber ? '<div class="meta-cell"><div class="meta-cell-label">Model</div><div class="meta-cell-value">' + esc(cs.modelNumber) + '</div></div>' : '') +
      '</div>' +

      renderVerifiedBy(cs) +

      section(1, 'Identity & Product Info',        renderIdentity(vc, cs),    0.05) +
      section(2, 'Issuer & Validity',               renderIssuer(vc),          0.10) +
      section(3, 'Material Provenance',              renderMaterials(cs),       0.15) +
      (renderDimensions(cs) ? section(4, 'Dimensions', renderDimensions(cs), 0.20) : '') +
      section(5, 'Performance Claims & Conformity',  renderClaims(cs),          0.25) +
      section(6, 'Linked Documents & Traceability',  renderDocuments(cs),       0.30) +
      section(7, 'Characteristics & End-of-Life',    renderCharacteristics(cs), 0.35);

  } catch (err) {
    document.getElementById('dpp-root').innerHTML =
      '<div style="color:#ff3d5a;padding:20px;font-family:monospace;">Error: ' + esc(err.message) + '</div>';
  }
</script>
